<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CDP北海道 会計システム</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css?v=20260623-6">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">C</span>
          <div>
            <strong>CDP会計</strong>
            <small>税理士提出用</small>
          </div>
        </div>
        <nav class="nav" aria-label="会計メニュー">
          <button class="nav-item is-active" data-view="dashboard" type="button">ホーム</button>
          <button class="nav-item" data-view="receipts" type="button">レシート管理</button>
          <button class="nav-item" data-view="receivedDocs" type="button">受領書類</button>
          <button class="nav-item" data-view="expenses" type="button">経費表</button>
          <button class="nav-item" data-view="approvals" type="button">申請・承認</button>
          <button class="nav-item" data-view="dataLink" type="button">データ連携</button>
          <button class="nav-item" data-view="documentExtracts" type="button">資料読取</button>
          <button class="nav-item" data-view="sales" type="button">売上</button>
          <button class="nav-item" data-view="invoices" type="button">請求書</button>
          <button class="nav-item" data-view="estimates" type="button">見積</button>
          <button class="nav-item" data-view="deliveries" type="button">納品書</button>
          <button class="nav-item" data-view="receiptDocs" type="button">領収書</button>
          <button class="nav-item" data-view="salesFlow" type="button">販売管理</button>
          <button class="nav-item" data-view="sendManagement" type="button">送付管理</button>
          <button class="nav-item" data-view="partners" type="button">取引先</button>
          <button class="nav-item" data-view="items" type="button">品目</button>
          <button class="nav-item" data-view="recurring" type="button">毎月自動</button>
          <button class="nav-item" data-view="trips" type="button">出張台帳</button>
          <button class="nav-item" data-view="payroll" type="button">給与台帳</button>
          <button class="nav-item" data-view="cards" type="button">カード台帳</button>
          <button class="nav-item" data-view="hitech" type="button">ハイテク台帳</button>
          <button class="nav-item" data-view="books" type="button">会計帳簿</button>
          <button class="nav-item" data-view="closing" type="button">締め・提出</button>
          <button class="nav-item" data-view="settings" type="button">設定</button>
        </nav>
        <div class="sidebar-footer">
          <small>ブラウザ保存</small>
          <small id="saveStatus">未保存</small>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">ホーム</h1>
            <p id="pageSubtitle">会計年度を選択してください</p>
          </div>
          <div class="topbar-actions">
            <label class="field compact">
              <span>年度</span>
              <select id="fiscalYearSelect"></select>
            </label>
            <button class="button ghost" id="exportAllButton" type="button">全体バックアップ</button>
            <label class="button ghost file-button">
              復元
              <input id="importAllInput" type="file" accept="application/json">
            </label>
          </div>
        </header>

        <section id="app" class="content" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="recordDialog">
      <div class="dialog-head">
        <h2 id="dialogTitle">詳細</h2>
        <button class="icon-button" id="dialogClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div id="dialogBody"></div>
    </dialog>

    <script src="app-v2.js?v=20260701-document-extracts"></script>
  </body>
</html>
